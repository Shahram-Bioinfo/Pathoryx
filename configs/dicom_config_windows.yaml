# =============================================================================
# PRODUCTION REFERENCE — DO NOT USE FOR TESTING
# This config reflects the live Sectra C-STORE production environment.
# For Windows test setup, use dicom_config.yaml instead.
# =============================================================================

dicom_service:
  perform_upload: false

paths:
  input_dirs:
    - "D:\\Slides\\SectraImport"
    - "D:\\Slides\\CaseSlides"
    - "D:\\Slides\\SlideScanner\\RazorCrest"
    - "\\\\fsx03\\ext01\\PATHO-IFC-Bilder\\FluoSectraImport"
    - "\\\\fsx03\\ext01\\PATHO-IFC-Bilder\\Fluo2026"
  output_root: "G:\\SectraImportDCM"

cleanup:
  delete_after_x_days: 10
  dirs_to_clean_up:
    - "D:\\Slides\\SectraImport"
    - "D:\\Slides\\CaseSlides"

conversion:
  image_conversion_method: "ids7_compatible_dcm"
  image_convertion_method: "xraydcm"
  allow_placeholder_copy: false
  supported_extensions:
    - ".svs"
    - ".tif"
    - ".tiff"
    - ".ndpi"
    - ".mrxs"
    - ".vms"
    - ".dcm"
    - ".jpeg"
    - ".jpg"
    - ".png"
  redicomize_when_hash_changed: false
  preserve_original_input: true

dicomize:
  enable_patient_info_retrieval_from_LIS: true
  redicomize_when_hash_changed: false
  image_convertion_method: "xraydcm"

dcmtk:
  bin_dir: ""
  dcmodify_path: ""
  dcmdump_path: ""

lis:
  enabled: true
  enrich_case_metadata: true
  sql_server: ${LIS_SQL_SERVER}
  username: ${LIS_SQL_USERNAME}
  password: ${LIS_SQL_PASSWORD}
  query_timeout_seconds: 15

wsidicomizer:
  enabled: true
  executable: wsidicomizer
  prefer_cli: true
  workers: null
  timeout_seconds: 7200

upload:
  dry_run: false
  timeout_seconds: 1800
  max_retries: 2
  retry_backoff_seconds: 10

cstore:
  upload_via_c_store: true
  peer_ip: "path-pacs2"
  default_peer_port: "32001"
  sec_dcm_bin: "C:\\Program Files\\Sectra\\ImageTools\\bin"
  file_type_dependent_ports:
    "32000":
      - ".svs"
      - "wsidcm"
    "32001":
      - ".svs"
      - ".ndpi"
      - ".dcm"
      - "wsidcm"
    "32002":
      - ".jpeg"
      - ".tif"
      - ".jpg"
      - ".png"

match_construct_patterns:
  lis_pattern:
    match: '(?P<case_id>[A-Za-z0-9]{12})(?P<specimen>[A-Z])(-|_)(?P<block>[0-9]+)(-|_)(?P<slide>[A-Za-z0-9]+)(?:(-|_)(?P<staining>[^\s_]+))?'
    zerofill: {}
    construct:
      slide_id:
        - "{case_id}{specimen}-{block}-{slide}"
      label:
        - "{case_id}{specimen}-{block}-{slide}"
      accession_number:
        - "{case_id}"
      study_id:
        - "{case_id}"
      specimen_box:
        - "{specimen}"
      block:
        - "{block}"
      slide_num:
        - "{slide}"
      staining:
        - "{staining}"
        - "Unknown"

  img_naming_pattern:
    match: '(?P<department>[A-Z])((_|\/|-){0,1})((?P<year_long>[0-9]{4})|(?P<year_short>[0-9]{2}))(_|\/|-)(?P<case>[0-9]+)(?:(_|\/|-)(?P<stain>[A-Za-z0-9-]+))?(?:(_|\/)(?P<Box>[A-Za-z]))?(?:(?P<block>[0-9]+))?'
    default:
      stain: "Unknown"
      block: "1"
      Box: "A"
    zerofill:
      case: 6
    construct:
      slide_id:
        - "{department}20{year_short}{case}S{Box}-{block}-80{stain}"
        - "{department}20{year_short}{case}SA-{block}-80{stain}"
        - "{department}{year_long}{case}S{Box}-{block}-80{stain}"
        - "{department}{year_long}{case}SA-{block}-80{stain}"
        - "{department}20{year_short}{case}S{Box}-1-80{stain}"
        - "{department}20{year_short}{case}SA-1-80{stain}"
        - "{department}{year_long}{case}S{Box}-1-80{stain}"
        - "{department}{year_long}{case}SA-1-80{stain}"
      label:
        - "{department}20{year_short}{case}S{Box}-{block}-80{stain}"
        - "{department}20{year_short}{case}SA-{block}-80{stain}"
        - "{department}{year_long}{case}S{Box}-{block}-80{stain}"
        - "{department}{year_long}{case}SA-{block}-80{stain}"
        - "{department}20{year_short}{case}S{Box}-1-80{stain}"
        - "{department}20{year_short}{case}SA-1-80{stain}"
        - "{department}{year_long}{case}S{Box}-1-80{stain}"
        - "{department}{year_long}{case}SA-1-80{stain}"
      accession_number:
        - "{department}20{year_short}{case}S"
        - "{department}{year_long}{case}S"
      study_id:
        - "{department}20{year_short}{case}S"
        - "{department}{year_long}{case}S"
      specimen_box:
        - "{Box}"
        - "A"
      block:
        - "{block}"
        - "1"
      slide_num:
        - "80{stain}"
      staining:
        - "{stain}"
        - "Unknown"

  faxitron_pattern:
    match: '(?P<department>[A-Z])(_|\/|-)(?P<case>[0-9]+)((_|\/|-){0,1})((?P<year_long>[0-9]{4})|(?P<year_short>[0-9]{2}))(?:(_|\/|-)(?P<stain>[A-Za-z0-9-]+))?(?:(_|\/)(?P<Box>[A-Za-z]))?(?:(?P<block>[0-9]+))?'
    default:
      stain: "Unknown"
      block: "1"
      Box: "A"
    zerofill:
      case: 6
    construct:
      specimen_box:
        - "{Box}"
        - "A"
      block:
        - "{block}"
        - "1"
      staining:
        - "{stain}"
        - "Unknown"
      slide_num:
        - "80{stain}"
      accession_number:
        - "{department}20{year_short}{case}S"
        - "{department}{year_long}{case}S"
      study_id:
        - "{department}20{year_short}{case}S"
        - "{department}{year_long}{case}S"
      slide_id:
        - "{department}20{year_short}{case}S{Box}-{block}-80{stain}"
        - "{department}20{year_short}{case}SA-{block}-80{stain}"
        - "{department}{year_long}{case}S{Box}-{block}-80{stain}"
        - "{department}{year_long}{case}SA-{block}-80{stain}"
        - "{department}20{year_short}{case}S{Box}-1-80{stain}"
        - "{department}20{year_short}{case}SA-1-80{stain}"
        - "{department}{year_long}{case}S{Box}-1-80{stain}"
        - "{department}{year_long}{case}SA-1-80{stain}"
      label:
        - "{department}20{year_short}{case}S{Box}-{block}-80{stain}"
        - "{department}20{year_short}{case}SA-{block}-80{stain}"
        - "{department}{year_long}{case}S{Box}-{block}-80{stain}"
        - "{department}{year_long}{case}SA-{block}-80{stain}"
        - "{department}20{year_short}{case}S{Box}-1-80{stain}"
        - "{department}20{year_short}{case}SA-1-80{stain}"
        - "{department}{year_long}{case}S{Box}-1-80{stain}"
        - "{department}{year_long}{case}SA-1-80{stain}"
