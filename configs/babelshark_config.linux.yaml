# ============================================================
# Palantir — BabelShark Runtime Configuration
# Windows Test Environment
# ============================================================

enable_full_pipeline: true
defer_trigger: true

pipeline_stages:
  label_extraction: true
  datamatrix: true
  stain_extraction: true
  roi_fallback: true
  slide_id_generation: true
  pasnet_validation: false

watch_mode: true
watch_interval_minutes: 1
log_level: "INFO"

operation_mode: "copy"
dry_run: false
timestamp_tag_enabled: true

wsi_types:
  - ".svs"
  - ".ndpi"
  - ".tif"
  - ".tiff"
  - ".scn"
  - ".mrxs"
  - ".bif"
  - ".png"
  - ".jpg"
  - ".jpeg"

watch_dir: "/home/shahram/Palantir/data/watch"
staging_dir: "/home/shahram/Palantir/data/staging"
failed_output_dir: "/home/shahram/Palantir/data/failed"
suspicious_output_routine_dir: "/home/shahram/Palantir/data/suspicious"
final_output_dir: "/home/shahram/Palantir/data/final"
final_slide_index_xlsx: "/home/shahram/Palantir/data/final_slide_ids.xlsx"

run_output_dir: "/home/shahram/Palantir/data/run_output"
metadata_excel_path: "/home/shahram/Palantir/data/run_output/slide_metadata.xlsx"

label_root_dir: "/home/shahram/Palantir/data/labels"
label_crops_dir: "/home/shahram/Palantir/data/label_crops"

# SQLite is used only as a legacy fallback; PostgreSQL is the primary DB.
sqlite_db_path: "/home/shahram/Palantir/data/WSI-Babel-Shark.sqlite"
ops_table: "WSI_Babel_Shark_ops"

scripts:
  label_extractor: "./pathoryx_enterprise/services/babelshark/core/label_extractor.py"
  datamatrix_reader: "./pathoryx_enterprise/services/babelshark/core/datamatrix_reader.py"
  roi_metadata_extractor: "./pathoryx_enterprise/services/babelshark/core/roi_metadata_extractor.py"
  stain_extractor: "./pathoryx_enterprise/services/babelshark/core/stain_extractor.py"
  extra_field_extractor: "./pathoryx_enterprise/services/babelshark/core/extra_field_extractor.py"
  pasnet_validator: "./pathoryx_enterprise/services/babelshark/core/pasnet_validator.py"
  slide_id_creator: "./pathoryx_enterprise/services/babelshark/core/slide_id_generator.py"
  sqlite_table_generator: "./pathoryx_enterprise/services/babelshark/core/database_manager.py"

rotate_associated_label: false
label_rotation_degrees_label: -90
label_crop_ratio: 0.30
label_rotation_degrees: -90
wsi_macro_img_tag: "macro"

stain_list_path: "./resources/stain_list.json"
stain_replace_map_path: "./resources/stain_error_replacements.json"

layout_model:
  backend: "resnet-open-set"
  model_dir: "./models"
  params:
    low_conf_gate: 0.90
    candidate_min: 0.91

roiset_selector:
  roiset_root: "./roisets"

roiset_root: "./roisets"

pxl_offset: 8
roi_pxl_offset: 12
roi_debug_dir: "/home/shahram/Palantir/data/roi_debug"
debug_parts_root: "/home/shahram/Palantir/data/roi_debug_parts"

allowed_labid_letters:
  - "E"
  - "R"

ocr_langs:
  - "en"

ocr_min_conf: 0.25
ocr_text_threshold: 0.7
ocr_ycenter_ths: 0.5
ocr_slope_ths: 0.1
ocr_paragraph: false
save_ocr_inputs: false

ocr_preprocess:
  clahe: true
  clahe_clip: 2.0
  clahe_grid: 8
  sharpen: true
  sharpen_strength: 1.2

registration:
  enabled: false
  method: "SIFT"
  sift_nfeatures: 4000
  sift_ratio: 0.75
  max_features: 2000
  good_match_ratio: 0.25

classifier_strip:
  enabled: false
  side: "left"
  fraction: 0.32

label_strip:
  enabled: false
  side: "left"
  fraction: 0.32

group_ref_image_pattern: "{group}.png"
use_group_ref_image_size: true
use_group_ref_as_registration: false
resize_to_ref: false

extraction_rules:
  Section:
    allowed_chars: "0123456789"
    replacement_patterns:
      - ["[^0-9]", ""]
      - ["^\\s+|\\s+$", ""]
    default_value: "1"

  Casenumber:
    allowed_chars: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/ "
    replacement_patterns:
      - ["[\\\\/_\\-]", "/"]
      - ["\\s+", " "]
      - ["O", "0"]
      - ["I", "1"]
      - ["l", "1"]
      - ["^\\s+|\\s+$", ""]
    default_value: null

  Pot-BlockID:
    allowed_chars: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 "
    replacement_patterns:
      - ["\\s+", " "]
      - ["[^A-Z0-9 ]", ""]
      - ["^\\s+|\\s+$", ""]
    default_value: null

  Stain:
    replacement_patterns: []
    default_value: null

sqlite:
  db_path: "/home/shahram/Palantir/data/WSI-Babel-Shark.sqlite"
  sqlite_source_table: "slides_raw"
  sqlite_clean_table: "normalized_slides"
  scanner_name_map:
    test: "labtest"

ocr_crop_config:
  top: 0
  bottom: 48
  left: 30
  right: 0

extra_field_extractor:
  enabled: false
  input_dir: "/home/shahram/Palantir/data/labels"
  output_dir: "/home/shahram/Palantir/data/run_output"
  output_excel_name: "extra_field_results.xlsx"
  debug_keys: false
  only_fields:
    - "Fresh1"
    - "Fresh2"
    - "city"

slide_id_generator:
  dry_run: true
  final_output_dir: "/home/shahram/Palantir/data/final"
  failed_output_dir: "/home/shahram/Palantir/data/failed"
  final_slide_index_xlsx: "/home/shahram/Palantir/data/final_slide_ids.xlsx"
  extras:
    enabled: false
    sep: "_"
    fields:
      - "Fresh1"
      - "city"
    include_zero: false
    default_value: "00"

research_case_generator:
  enabled: false
  case_list_excel: "./resources/case_blacklist.xlsx"
  destination_dir: "/home/shahram/Palantir/data/special_cases"
  excel_sheet: 0

pasnet_validator:
  enabled: false
  mode: "pre_rename"
  dry_run: true
  fail_open: true
  server_env: "PASNET_SERVER"
  username_env: "PASNET_USERNAME"
  password_env: "PASNET_PASSWORD"
  report_xlsx_path: "/home/shahram/Palantir/data/run_output/pasnet_validation_report.xlsx"
  report_sheet_results: "results"
  report_sheet_overrides: "overrides"
  suspicious_output_routine_dir: "/home/shahram/Palantir/data/suspicious"
  sqlite_db_path: "/home/shahram/Palantir/data/WSI-Babel-Shark.sqlite"
  sqlite_auto_register: true
  ops_table: "WSI_Babel_Shark_ops"
  log_table: "WSI_Babel_Shark_pre_rename_pasnet_log"

# ============================================================
# Phase 4.8 — Routing Policy Engine (Stage 1: dry-run only)
#
# dry_run: true  →  Engine computes and audits decisions
#                   but does NOT alter upload destinations.
#                   Set to false only after Stage 1 validation.
#
# Scanner IDs must match scanner_fleet.yaml exactly:
#   M40010    Resolute          (Leica Aperio GT450, lab-main)
#   M40015    Avenger           (Leica Aperio GT450, lab-main)
#   M40023    HomeOne           (Leica Aperio GT450, lab-secondary)
#   M40024    Chimera           (Leica Aperio GT450, lab-secondary)
#   SS12620R  StarDestroyer     (Leica Aperio GT450 RUO, lab-main)
# ============================================================

routing_policies:
  dry_run: true
  timezone: "Europe/Copenhagen"
  fallback_destination: "clinical_pacs"
  default_mode: "clinical_day"

  modes:

    clinical_day:
      active:
        start: "08:00"
        end: "16:00"
      profile: "clinical"
      default_destination: "clinical_pacs"
      scanner_destinations: {}

    research_night:
      active:
        start: "16:00"
        end: "07:00"
      profile: "research"
      default_destination: "research_storage"
      scanner_destinations:
        M40010:
          destination: "research_storage_resolute"
        M40015:
          destination: "research_storage_avenger"
        M40023:
          destination: "research_storage_homeone"
        M40024:
          destination: "research_storage_chimera"
        SS12620R:
          destination: "research_storage_stardestroyer"

  color_dot_rules:
    red:
      destination: "urgent_research"
    blue:
      destination: "research_project_blue"
    green:
      destination: "research_project_green"
    yellow:
      destination: "clinical_special"
