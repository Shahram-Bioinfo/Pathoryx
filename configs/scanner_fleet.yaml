# =============================================================================
# Palantir — Scanner Fleet Configuration
# =============================================================================
#
# Maps operational scanner_id values (as recorded in the pipeline database)
# to human-readable display names for the dashboard.
#
# scanner_id:    The canonical ID stored in FileRecord, upload_results, and
#                upload_tracking.estimated_upload_queue. Must match exactly.
# serial_number: Physical instrument serial number (informational; matches
#                scanner_id for Aperio scanners).
# display_name:  Short operational name shown in the dashboard UI.
# location:      Physical location label (shown in tooltips and details).
# vendor:        Scanner manufacturer (informational).
# model:         Scanner model name (informational).
# aliases:       Legacy or alternate IDs that resolve to this scanner.
#                Useful for backward compatibility when scanner IDs change.
# enabled:       true = scanner visible in filter dropdowns.
#                false = scanner hidden from filters but still visible if it
#                        has active pipeline data (data always wins over config).
#
# Reload requires a dashboard service restart. Unknown scanner IDs
# (not listed here) fall back to displaying the raw scanner_id.
# =============================================================================

scanners:
  - scanner_id:    M40010
    serial_number: M40010
    display_name:  Resolute
    location:      lab-main
    vendor:        Leica Biosystems
    model:         Aperio GT450
    aliases:       [scanner-02]
    enabled:       true

  - scanner_id:    M40015
    serial_number: M40015
    display_name:  Avenger
    location:      lab-main
    vendor:        Leica Biosystems
    model:         Aperio GT450
    aliases:       []
    enabled:       true

  - scanner_id:    M40023
