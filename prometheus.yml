global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'pathoryx-babelshark'
    static_configs:
      - targets: ['babelshark:9091']

  - job_name: 'pathoryx-qc'
    static_configs:
      - targets: ['qc:9092']

  - job_name: 'pathoryx-dicom'
    static_configs:
      - targets: ['dicom:9093']

  - job_name: 'pathoryx-uploader'
    static_configs:
      - targets: ['uploader:9094']

  - job_name: 'pathoryx-recovery-sentry'
    static_configs:
      - targets: ['recovery_sentry:9097']
